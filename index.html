    <style>
        /* ================= الهوية: Gamified Dark Mode ================= */
        :root {
            --primary: #ff6a19;
            --primary-glow: rgba(255, 106, 25, 0.3); 
            --bg-black: #000000;
            --surface: #1e1e1e;
            --surface-light: #2a2a2a;
            --border-thick: #000000;
            --text-main: #ffffff;
            --success: #ffcc00;
            --call-green: #25d366;
            --shadow-orange: 0 6px 0 var(--primary);
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition: all 0.2s ease-in-out;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { background-color: #000; color: var(--text-main); height: 100%; overflow: hidden; }
        
        .app-container {
            max-width: 600px; margin: 0 auto; height: 100vh;
            display: flex; flex-direction: column; position: relative;
            background: linear-gradient(to bottom, #333333 0%, var(--bg-black) 100%);
            border-left: 3px solid var(--border-thick); border-right: 3px solid var(--border-thick);
            box-shadow: 0 0 50px var(--primary-glow);
        }

        /* ================= الترويسة ================= */
        .kiosk-header {
            padding: 20px; display: flex; align-items: center; justify-content: center;
            background: var(--surface); border-bottom: 3px solid var(--border-thick);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 10; position: relative;
        }

        .btn-back {
            position: absolute; right: 20px; background: #000; border: 2px solid var(--border-thick);
            color: var(--primary); width: 45px; height: 45px; border-radius: 12px;
            display: flex; justify-content: center; align-items: center; font-size: 1.4rem; cursor: pointer;
            box-shadow: var(--shadow-orange); opacity: 0; pointer-events: none; transition: var(--transition);
        }
        .btn-back.visible { opacity: 1; pointer-events: auto; }
        .btn-back:active { transform: translateY(6px); box-shadow: 0 0px 0 var(--primary); }

        .brand-title { font-size: 2.2rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; color: white; text-shadow: 2px 2px 0 #000; }
        .brand-title span { color: var(--primary); }

        /* ================= الشاشات ================= */
        .view-section {
            flex: 1; overflow-y: auto; padding: 20px 20px 180px; 
            display: none; opacity: 0; transform: scale(0.95);
            animation: bounceIn 0.4s var(--spring) forwards; scrollbar-width: none;
        }
        .view-section.active { display: block; }
        @keyframes bounceIn { to { opacity: 1; transform: scale(1); } }

        .page-title { font-size: 1.4rem; font-weight: 900; margin-bottom: 25px; color: var(--text-main); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .page-title span { color: var(--primary); }

        .grid-layout { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }

        /* ================= المربعات والأيقونات ================= */
        .square-card {
            background: var(--surface); border: 3px solid var(--border-thick); border-radius: 20px; aspect-ratio: 1 / 1.1; 
            position: relative; overflow: hidden; cursor: pointer; box-shadow: var(--shadow-orange); transition: var(--transition);
        }
        .square-card:active { transform: translateY(6px); box-shadow: 0 0px 0 var(--primary); }
        .square-card.has-items { background: #2a1a0c; border-color: var(--primary); }

        .card-main { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px; transition: transform 0.4s var(--spring); z-index: 2; }
        
        .card-icon-container { font-size: 3rem; color: var(--primary); margin-bottom: 8px; filter: drop-shadow(0 3px 0 #000); transition: transform 0.4s var(--spring); display: flex; align-items: center; justify-content: center; }
        .card-icon-container svg { width: 1em; height: 1em; }

        .square-card.controls-open .card-icon-container { transform: scale(0.75) translateY(10px); }

        .card-name { font-size: 1.05rem; font-weight: 800; text-align: center; line-height: 1.2; }
        .card-price { font-size: 0.9rem; font-weight: 900; color: var(--success); margin-top: 5px; background: #000; padding: 2px 8px; border-radius: 8px; }

        .square-card.controls-open .card-main { transform: translateY(-30px); }
        
        .bestseller-badge {
            position: absolute; top: 0; right: 0; background: #e74c3c; color: white; padding: 4px 10px; font-size: 0.75rem; font-weight: 900; border-bottom-left-radius: 12px; border-left: 2px solid var(--border-thick); border-bottom: 2px solid var(--border-thick); z-index: 5;
        }

        /* ================= درج التحكم بالكمية وإدخال السعر ================= */
        .action-drawer {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; background: var(--primary); border-top: 3px solid var(--border-thick); display: flex; justify-content: space-between; align-items: center; padding: 0 10px; transform: translateY(100%); opacity: 0; transition: transform 0.4s var(--spring), opacity 0.3s ease; z-index: 3;
        }
        .square-card.controls-open .action-drawer { transform: translateY(0); opacity: 1; }
        
        .qty-btn { background: var(--surface); color: var(--text-main); border: 2px solid var(--border-thick); width: 38px; height: 38px; border-radius: 10px; font-size: 1.5rem; font-weight: 900; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 3px 0 var(--border-thick); }
        .qty-btn:active { transform: translateY(3px); box-shadow: 0 0px 0 var(--border-thick); background: #000;}
        .qty-num { font-size: 1.6rem; font-weight: 900; color: #000; min-width: 30px; text-align: center; }
        
        /* إدخال السعر المخصص */
        .custom-price-input { width: 100%; height: 38px; background: white; border: 2px solid var(--border-thick); border-radius: 10px; padding: 0 10px; font-size: 1rem; font-weight: 800; color: #000; text-align: center; margin-left: 10px; outline: none; }
        .btn-add-custom { background: var(--surface); color: white; border: 2px solid var(--border-thick); height: 38px; padding: 0 15px; border-radius: 10px; font-weight: 900; cursor: pointer; box-shadow: 0 3px 0 var(--border-thick); }
        .btn-add-custom:active { transform: translateY(3px); box-shadow: 0 0 0; }

        .close-drawer-btn { position: absolute; top: 10px; right: 10px; background: #000; border: 2px solid var(--border-thick); color: white; width: 28px; height: 28px; border-radius: 50%; font-size: 0.9rem; display: flex; justify-content: center; align-items: center; opacity: 0; transform: scale(0); transition: 0.3s ease; z-index: 4; }
        .square-card.controls-open .close-drawer-btn { opacity: 1; transform: scale(1); }
        
        .added-badge { position: absolute; top: 10px; left: 10px; background: var(--primary); color: white; width: 32px; height: 32px; border: 2px solid var(--border-thick); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; opacity: 0; transform: scale(0); transition: var(--spring); z-index: 5; box-shadow: 0 3px 0 var(--border-thick); }
        .square-card.has-items:not(.controls-open) .added-badge { opacity: 1; transform: scale(1); }

        /* ================= الفوتر ================= */
        .kiosk-footer { margin-top: 40px; padding-top: 25px; border-top: 3px dashed var(--surface-light); display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .footer-top-row { display: flex; justify-content: center; align-items: center; width: 100%; gap: 15px; flex-wrap: wrap; }
        .delivery-badge { background: var(--success); color: var(--border-thick); border: 2px solid var(--border-thick); border-radius: 12px; padding: 6px 15px; font-weight: 900; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; box-shadow: 0 3px 0 #000; transform: rotate(-2deg); animation: floatDelivery 2.5s ease-in-out infinite; }
        @keyframes floatDelivery { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-4px) rotate(-1deg); } }
        .social-links { display: flex; gap: 12px; justify-content: center; }
        .social-btn { background: var(--surface-light); color: white; border: 2px solid var(--border-thick); width: 45px; height: 45px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 1.3rem; text-decoration: none; box-shadow: 0 3px 0 #000; transition: transform 0.2s;}
        .social-btn:active { transform: translateY(3px); box-shadow: 0 0 0 #000; }
        .social-btn.phone-btn { background: var(--primary); color: white; animation: pulsePhone 2s infinite; border: 2px solid #000; }
        @keyframes pulsePhone { 0% { box-shadow: 0 3px 0 #000, 0 0 0 0 rgba(255,106,25,0.7); } 70% { box-shadow: 0 3px 0 #000, 0 0 0 10px rgba(255,106,25,0); } 100% { box-shadow: 0 3px 0 #000, 0 0 0 0 rgba(255,106,25,0); } }
        .contact-number-display { font-size: 1.1rem; font-weight: 800; color: white; text-align: center; background: rgba(255,255,255,0.03); padding: 12px 20px; border-radius: 15px; border: 2px dashed var(--surface-light); display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; width: 100%; }
        .contact-number-display span { color: var(--primary); font-size: 1.2rem; font-weight: 900; letter-spacing: 1px;}

        /* ================= شريط السلة ================= */
        .cart-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%) translateY(150px); width: calc(100% - 40px); background: var(--surface-light); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border: 3px solid var(--border-thick); border-radius: 18px; cursor: pointer; z-index: 1000; box-shadow: var(--shadow-orange); transition: transform 0.5s var(--spring); }
        .cart-bar.visible { transform: translateX(-50%) translateY(0); }
        .cart-info { display: flex; align-items: center; gap: 15px; font-size: 1.2rem; font-weight: 900; color: white;}
        .cart-badge { background: var(--primary); color: white; width: 38px; height: 38px; border-radius: 12px; border: 2px solid var(--border-thick); box-shadow: 0 3px 0 var(--border-thick); display: flex; justify-content: center; align-items: center; font-weight: 900;}
        .cart-bar-icon { background: #000; color: var(--primary); width: 45px; height: 45px; border-radius: 12px; border: 2px solid var(--border-thick); display: flex; justify-content: center; align-items: center; font-size: 1.3rem; }
        .cart-bar-icon i { animation: floatIcon 2s ease-in-out infinite; }
        @keyframes floatIcon { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        /* ================= الفاتورة واختيار المنطقة ================= */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); z-index: 2000; display: none; justify-content: center; align-items: flex-end; opacity: 0; transition: 0.3s ease; }
        .modal-overlay.active { opacity: 1; }
        .cart-modal { background: var(--surface); width: 100%; max-width: 600px; border-radius: 35px 35px 0 0; padding: 30px 25px; max-height: 90vh; overflow-y: auto; border-top: 3px solid var(--primary); transform: translateY(100%); transition: 0.5s var(--spring); }
        .modal-overlay.active .cart-modal { transform: translateY(0); }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;}
        .modal-header h3 { font-size: 1.6rem; font-weight: 900; display: flex; align-items: center; gap: 10px;}
        .close-modal { background: #000; border: 2px solid var(--border-thick); width: 45px; height: 45px; border-radius: 12px; font-size: 1.4rem; cursor: pointer; color: white; box-shadow: 0 3px 0 var(--border-thick);}
        
        .cart-item-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 2px dashed var(--surface-light); flex-wrap: wrap; gap: 10px;}
        .cart-item-name { font-weight: 800; font-size: 1.1rem; color: var(--text-main); flex: 1; }
        .cart-item-price { font-size: 0.9rem; color: #aaa; margin-right: 10px; }
        
        .cart-item-actions { display: flex; align-items: center; gap: 10px; background: rgba(255, 106, 25, 0.1); padding: 5px; border-radius: 10px; border: 1px solid var(--primary); }
        .modal-qty-btn { background: var(--surface); color: white; border: 1px solid var(--border-thick); width: 30px; height: 30px; border-radius: 8px; font-size: 1.2rem; font-weight: 900; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 2px 0 var(--border-thick); }
        .modal-qty-btn:active { transform: translateY(2px); box-shadow: 0 0px 0 var(--border-thick); background: var(--primary);}
        .cart-item-qty { font-weight: 900; font-size: 1.1rem; color: var(--primary); min-width: 20px; text-align: center; }
        
        .cart-total-row { display: flex; justify-content: space-between; align-items: center; padding: 20px 0 10px; margin-top: 10px; border-top: 3px solid var(--surface-light); font-size: 1.4rem; font-weight: 900; color: var(--success); }

        .delivery-section { margin-top: 25px; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 20px; border: 2px solid var(--border-thick); }
        .delivery-section h4 { margin-bottom: 15px; font-size: 1.1rem; color: var(--success); display: flex; align-items: center; gap: 8px;}
        
        /* أزرار الطلب ستايل Papa's */
        .order-type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .type-btn {
            background: var(--surface-light); border: 3px solid var(--border-thick); color: white; padding: 20px 10px; border-radius: 15px; font-weight: 900; font-size: 1.1rem; cursor: pointer; text-align: center; transition: all 0.2s; box-shadow: 0 4px 0 #000; display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .type-btn i { font-size: 2rem; color: var(--primary); }
        .type-btn.selected { background: var(--primary); border-color: white; transform: translateY(4px); box-shadow: 0 0px 0 #000; color: #000;}
        .type-btn.selected i { color: #000; }

        .btn-confirm { width: 100%; background: var(--primary); color: white; border: 3px solid var(--border-thick); padding: 16px; border-radius: 15px; font-size: 1.3rem; font-weight: 900; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; box-shadow: 0 4px 0 #000; text-transform: uppercase; border-style: solid; transition: transform 0.2s;}
        .btn-confirm:active { transform: translateY(4px); box-shadow: 0 0px 0 #000; }
        .action-buttons-group { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        
    </style>

                    { name: 'كريم توم', price: 3000 }, 
                    { name: 'مايونيز غربي', price: 3000 }, 
                    { name: 'كوكتيل', price: 3000 }, 
                    { name: 'هاني ماسترد', price: 3000 }, 
                    { name: 'حد', price: 3000 }, 
                    { name: 'توم حد', price: 3000 }
                ]}
            ]},
            { id: 'drinks', title: 'المشروبات', icon: 'fa-bottle-water', items: [
                { name: 'بيبسي وسط', price: 9000 }, 
                { name: 'سفن وسط', price: 9000 }, 
                { name: 'بيبسي عائلي', price: 16000 }, 
                { name: 'سفن عائلي', price: 16000 }, 
                { name: 'بيبسي تنك', price: 6000 }, 
                { name: 'سفن تنك', price: 6000 }, 
                { name: 'عيران', price: 4000 }, 
                { name: 'مياه صغيرة', price: 3000 }, 
                { name: 'راني', price: 6000 }, 
                { name: 'كينزا سودا', price: 5000 }, 
                { name: 'كينزا دايت', price: 5000 }, 
                { name: 'كينزا حمضيات', price: 5000 }, 
                { name: 'استرو', price: 4000 }
            ]},
            { id: 'rice', title: 'الرز', icon: 'fa-bowl-rice', items: [
                { name: 'رز منسف كبير', price: 30000 }, 
                { name: 'رز منسف صغير', price: 12000 }
            ]}
        ];

        let siteData = {
            phone: "0945313762",
            facebook: "https://www.facebook.com/share/1DzLBC24NE/",
            instagram: "https://instagram.com/Fly_chicken_sahnaya"
        };

        let cart = {}; 
        let selectedOrderType = null; 
        let navigationHistory = [];

        const viewCategories = document.getElementById('view-categories');
        const viewItems = document.getElementById('view-items');
        const btnBack = document.getElementById('btn-back');

        // ================= التعديل الأساسي: جلب البيانات ديناميكياً ودعم الثوابت عند الخطأ =================
        async function loadAppData() {
            try {
                // جلب الروابط والأرقام من لوحة التحكم
                const siteResponse = await fetch('./content/site.json');
                if(siteResponse.ok) {
                    siteData = await siteResponse.json();
                    updateContactUI();
                }

                // جلب المنيو من لوحة التحكم
                const menuResponse = await fetch('./content/menu.json');
                if(menuResponse.ok) {
                    const menuJson = await menuResponse.json();
                    if(menuJson.categories && menuJson.categories.length > 0) {
                        menuData = menuJson.categories;
                    }
                }
            } catch (error) {
                console.log("تم الانتقال لعرض البيانات الاحتياطية الافتراضية:", error);
            } finally {
                // عرض البيانات في كل الأحوال (سواء تم الجلب أو استخدمنا الاحتياطية)
                renderCategories();
            }
        }

        function updateContactUI() {
            document.querySelector('.phone-btn').href = `tel:${siteData.phone}`;
            document.querySelector('.fb').href = siteData.facebook;
            document.querySelector('.ig').href = siteData.instagram;
            document.getElementById('display-phone').innerText = siteData.phone;
        }

        // تشغيل الجلب التلقائي عند بداية تحميل التطبيق
        loadAppData();
        // ========================================================================================

        function getIconHTML(iconName) {
            if (iconName === 'svg_shawarma') {
                return `<svg viewBox="0 0 64 64" fill="currentColor">
                          <path d="M30 2h4v8h-4z M16 12h32q4 0 4 4t-4 4H16q-4 0-4-4t4-4z M18 22h28q4 0 4 4t-4 4H18q-4 0-4-4t4-4z M20 32h24q4 0 4 4t-4 4H20q-4 0-4-4t4-4z M22 42h20q4 0 4 4t-4 4H22q-4 0-4-4t4-4z M30 52h4v10h-4z"/>
                        </svg>`;
            } else if (iconName === 'svg_sandwich') {
                return `<svg viewBox="0 0 64 64" fill="currentColor">
                          <path d="M10 26 C 10 10, 54 10, 54 26 Z" />
                          <path d="M6 30 L16 24 L24 32 L32 24 L40 32 L48 24 L58 30 L58 36 L6 36 Z" />
                          <path d="M10 40 C 10 52, 54 52, 54 40 Z" />
                        </svg>`;
            } else if (iconName === 'svg_fries') {
                return `<svg viewBox="0 0 64 64" fill="currentColor">
                          <path d="M14 12h5v20h-5z M23 6h5v26h-5z M32 4h6v28h-6z M41 8h5v24h-5z M50 14h4v16h-4z M10 30 L16 60 H48 L54 30 C 40 40 24 40 10 30 Z"/>
                        </svg>`;
            } else {
                return `<i class="fas ${iconName}"></i>`;
            }
        }
        
        function renderCategories() {
            navigationHistory = []; 
            const grid = document.getElementById('categories-grid');
            grid.innerHTML = '';
            menuData.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'square-card';
                card.innerHTML = `<div class="card-main">
                                    <div class="card-icon-container">${getIconHTML(cat.icon)}</div>
                                    <div class="card-name">${cat.title}</div>
                                  </div>`;
                card.onclick = () => openCategory(cat);
                grid.appendChild(card);
            });
            updateContactUI();
        }

        function openCategory(category) {
            navigationHistory.push(category); 
            renderCurrentLevel(category);
        }

        function renderCurrentLevel(category) {
            viewCategories.classList.remove('active');
            setTimeout(() => {
                const grid = document.getElementById('items-grid');
                grid.innerHTML = '';
                
                if (category.subCategories) {
                    category.subCategories.forEach(sub => {
                        const card = document.createElement('div');
                        card.className = 'square-card';
                        card.innerHTML = `<div class="card-main">
                                            <div class="card-icon-container">${getIconHTML(sub.icon)}</div>
                                            <div class="card-name">${sub.title}</div>
                                          </div>`;
                        card.onclick = () => openCategory(sub);
                        grid.appendChild(card);
                    });
                } else if (category.items) {
                    category.items.forEach(item => {
                        let qty = 0;
                        if(!item.customPrice) qty = cart[item.name] ? cart[item.name].qty : 0;
                        
                        const card = document.createElement('div');
                        card.className = `square-card ${qty > 0 ? 'has-items' : ''}`;
                        const bestsellerHTML = item.bestseller ? `<div class="bestseller-badge">الأكثر طلباً🔥</div>` : '';
                        const priceHTML = item.customPrice ? `<div class="card-price">حدد السعر</div>` : `<div class="card-price">${item.price.toLocaleString()} ل.س</div>`;
                        
                        let drawerHTML = '';
                        if (item.customPrice) {
                            // تم إصلاح مشكلة قراءة معرّف الـ input هنا ليعمل برمجياً دون مشاكل مسافات
                            const safeId = item.name.replace(/\s+/g, '');
                            drawerHTML = `
                                <div class="action-drawer" style="justify-content: center;">
                                    <input type="number" class="custom-price-input" id="customPrice_${safeId}" placeholder="أدخل السعر (ل.س)">
                                    <button class="btn-add-custom" data-item="${item.name}">إضافة</button>
                                </div>
                            `;
                        } else {
                            drawerHTML = `
                                <div class="action-drawer">
                                    <button class="qty-btn minus" data-item="${item.name}">-</button>
                                    <span class="qty-num">${qty}</span>
                                    <button class="qty-btn plus" data-item="${item.name}">+</button>
                                </div>
                            `;
                        }

                        card.innerHTML = `${bestsellerHTML}
                                        <div class="added-badge">${qty}</div>
                                        <button class="close-drawer-btn"><i class="fas fa-times"></i></button>
                                        <div class="card-main">
                                            <div class="card-icon-container">${getIconHTML(category.icon)}</div>
                                            <div class="card-name">${item.name}</div>
                                            ${priceHTML}
                                        </div>
                                        ${drawerHTML}`;
                        
                        const cardMain = card.querySelector('.card-main');
                        cardMain.addEventListener('click', () => {
                            if(card.classList.contains('controls-open')) { card.classList.remove('controls-open'); return; }
                            document.querySelectorAll('.square-card.controls-open').forEach(c => c.classList.remove('controls-open'));
                            card.classList.add('controls-open');
                        });
                        
                        card.querySelector('.close-drawer-btn').addEventListener('click', (e) => { e.stopPropagation(); card.classList.remove('controls-open'); });
                        
                        if(item.customPrice) {
                            card.querySelector('.btn-add-custom').addEventListener('click', (e) => {
                                e.stopPropagation();
                                const safeId = item.name.replace(/\s+/g, '');
                                const priceInput = document.getElementById(`customPrice_${safeId}`).value;
                                if(priceInput && parseInt(priceInput) > 0) {
                                    const customName = `${item.name} (بـ ${priceInput} ل.س)`;
                                    if(!cart[customName]) cart[customName] = { qty: 0, price: parseInt(priceInput) };
                                    cart[customName].qty++;
                                    document.getElementById(`customPrice_${safeId}`).value = ''; 
                                    card.classList.remove('controls-open');
                                    updateMainCartUI();
                                    card.style.borderColor = "var(--call-green)";
                                    setTimeout(()=> card.style.borderColor = "", 500);
                                } else {
                                    alert("الرجاء إدخال سعر صحيح!");
                                }
                            });
                        } else {
                            card.querySelector('.plus').addEventListener('click', (e) => { 
                                e.stopPropagation(); 
                                if(!cart[item.name]) cart[item.name] = { qty: 0, price: item.price };
                                cart[item.name].qty++; 
                                updateCardVisuals(card, item.name); updateMainCartUI(); 
                            });
                            card.querySelector('.minus').addEventListener('click', (e) => { 
                                e.stopPropagation(); 
                                if(cart[item.name] && cart[item.name].qty > 0) { 
                                    cart[item.name].qty--; 
                                    if(cart[item.name].qty === 0) { delete cart[item.name]; card.classList.remove('controls-open'); } 
                                    updateCardVisuals(card, item.name); updateMainCartUI(); 
                                } 
                            });
                        }

                        grid.appendChild(card);
                    });
                }

                document.getElementById('category-title').innerHTML = `<span style="font-size: 1.2em; color: var(--primary); display:inline-flex; align-items:center;">${getIconHTML(category.icon)}</span> ${category.title}`;
                viewItems.classList.add('active'); 
                btnBack.classList.add('visible');
            }, 300);
        }

        btnBack.addEventListener('click', () => {
            navigationHistory.pop(); 
            
            if (navigationHistory.length > 0) {
                const previousCategory = navigationHistory[navigationHistory.length - 1];
                renderCurrentLevel(previousCategory);
            } else {
                viewItems.classList.remove('active'); 
                btnBack.classList.remove('visible');
                setTimeout(() => { viewCategories.add('active'); renderCategories(); }, 300);
            }
        });

        function updateCardVisuals(card, name) {
            const qty = cart[name] ? cart[name].qty : 0;
            if(card.querySelector('.qty-num')) card.querySelector('.qty-num').innerText = qty;
            card.querySelector('.added-badge').innerText = qty;
            if(qty > 0) card.classList.add('has-items'); else card.classList.remove('has-items');
        }

        function updateMainCartUI() {
            const stickyBar = document.getElementById('view-cart-btn');
            let totalQty = 0;
            for (let key in cart) { totalQty += cart[key].qty; }

            if(totalQty > 0) { stickyBar.classList.add('visible'); document.getElementById('cart-total-badge').innerText = totalQty; }
            else { stickyBar.classList.remove('visible'); closeCartModal(); }
        }

        function setOrderType(type) {
            selectedOrderType = type;
            document.getElementById('btn-pickup').classList.remove('selected');
            document.getElementById('btn-delivery').classList.remove('selected');
            document.getElementById(`btn-${type}`).classList.add('selected');
        }

        const modalOverlay = document.getElementById('cart-modal-overlay');
        
        function renderCartModalItems() {
            const list = document.getElementById('cart-items-list');
            list.innerHTML = '';
            let totalPrice = 0;

            for (let item in cart) {
                if(cart[item].qty > 0) {
                    const itemTotal = cart[item].qty * cart[item].price;
                    totalPrice += itemTotal;
                    list.innerHTML += `
                    <div class="cart-item-row">
                        <div class="cart-item-actions">
                            <button class="modal-qty-btn" onclick="updateCartItemModal('${item}', 1)">+</button>
                            <span class="cart-item-qty">${cart[item].qty}</span>
                            <button class="modal-qty-btn" onclick="updateCartItemModal('${item}', -1)">-</button>
                        </div>
                        <span class="cart-item-name">${item}</span>
                        <span class="cart-item-price">${itemTotal.toLocaleString()} ل.س</span>
                    </div>`;
                }
            }
            document.getElementById('cart-total-price').innerText = `${totalPrice.toLocaleString()} ل.س`;
        }

        window.updateCartItemModal = function(itemName, change) {
            if(cart[itemName]) {
                cart[itemName].qty += change;
                if(cart[itemName].qty <= 0) {
                    delete cart[itemName];
                }
                
                updateMainCartUI();
                renderCartModalItems();
                
                document.querySelectorAll('.square-card').forEach(card => {
                    const nameEl = card.querySelector('.card-name');
                    if(nameEl && nameEl.innerText === itemName) {
                        const qty = cart[itemName] ? cart[itemName].qty : 0;
                        if(card.querySelector('.qty-num')) card.querySelector('.qty-num').innerText = qty;
                        const badge = card.querySelector('.added-badge');
                        if(badge) badge.innerText = qty;
                        
                        if(qty > 0) {
                            card.classList.add('has-items');
                        } else {
                            card.classList.remove('has-items');
                            card.classList.remove('controls-open');
                        }
                    }
                });
            }
        };

        document.getElementById('view-cart-btn').addEventListener('click', () => {
            renderCartModalItems(); modalOverlay.style.display = 'flex';
            setTimeout(() => modalOverlay.classList.add('active'), 10);
        });

        function closeCartModal() { modalOverlay.classList.remove('active'); setTimeout(() => modalOverlay.style.display = 'none', 300); }
        document.getElementById('close-modal').addEventListener('click', closeCartModal);

        // إرسال الواتساب
        document.getElementById('send-whatsapp-btn').addEventListener('click', () => {
            if(!selectedOrderType) { alert('الرجاء تحديد طريقة الاستلام (من المطعم أو توصيل) 🛵'); return; }
            
            let msg = "🔥 طلب جديد | Fly Chicken\n\n";
            let grandTotal = 0;

            for (let item in cart) {
                if(cart[item].qty > 0) {
                    msg += `▪️ ${cart[item].qty}x ${item}\n`;
                    grandTotal += (cart[item].qty * cart[item].price);
                }
            }
            
            msg += `\n💰 المجموع: ${grandTotal.toLocaleString()} ل.س\n`;

            if (selectedOrderType === 'pickup') { 
                msg += `📍 الاستلام: من المطعم`; 
            } else { 
                msg += `📍 الاستلام: توصيل (يرجى تزويدنا بالعنوان أدناه)`; 
            }
            
            msg += `\n\n👤 الاسم: \nالعنوان (في حال التوصيل): \n📝 ملاحظات: `;
            
            // تحويل ديناميكي للرقم من صيغة الحفظ إلى صيغة إرسال واتساب الدولية البادئة بـ 963
            let cleanPhone = siteData.phone ? siteData.phone.replace(/^0/, '963') : '963945313762';
            window.open(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`, '_blank');
        });

        // ================= إضافة صوت النقرة (Apple Click) =================
        const appleClickSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
        appleClickSound.volume = 0.5;

        document.addEventListener('click', function(event) {
            const isClickableElement = event.target.closest('button') ||
                                       event.target.closest('.square-card') ||
                                       event.target.closest('.cart-bar') ||
                                       event.target.closest('.social-btn') ||
                                       event.target.closest('.card-main');

            if (isClickableElement) {
                appleClickSound.currentTime = 0; 
                appleClickSound.play().catch(error => {
                    console.log("تنبيه: المتصفح يمنع تشغيل الصوت قبل تفاعل المستخدم بشكل كامل.");
                });
            }
        });

        // سكربت إرجاع المستخدم بعد تسجيل الدخول من Identity Widget
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>
